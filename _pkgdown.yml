url: https://replicate-anything.github.io/replicateEverything/
template:
  bootstrap: 5
  includes:
    in_header: |
      <script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
      <script>mermaid.initialize({ startOnLoad: true });</script>
home:
  title: replicateEverything
  description: Discover, run, and contribute computational replications — with a bundled Shiny demo and live app at shiny2.wzb.eu/ipi/replicate/
navbar:
  structure:
    left:
    - home
    - reference
    - articles
    right: github
reference:
- title: Package
  desc: Package overview.
  contents:
  - replicateEverything-package
- title: Discovery
  desc: Find studies and inspect replication metadata.
  contents:
  - load_index
  - search_papers
  - list_replications
  - paper_article_url
- title: Run & inspect
  desc: Run tables and figures and read the code behind them.
  contents:
  - run_replication
  - get_code
  - describe_study_dag
- title: 'Contribute: build & check'
  desc: Bake precomputed outputs and validate a study repo before registration.
  contents:
  - build_study_outputs
  - check_replication
  - check_and_bake_study
- title: 'Maintainer: registry ops'
  desc: Register studies, sync stubs, rebuild the index, and audit the registry.
  contents:
  - register_study
  - sync_study_to_registry
  - refresh_registry
  - build_registry_index
  - audit_everything
- title: 'Maintainer: setup & diagnostics'
  desc: Probe and install study dependencies; local monorepo and deploy diagnostics.
  contents:
  - configure_local_monorepo
  - check_study_compatibility
  - install_dependencies
  - maintainer_dependency_hint
  - package_build_info
  - package_deploy_diagnostics
  - build_outputs
  - validate_outputs
- title: Shiny app
  desc: Launch the bundled Shiny demo locally.
  contents:
  - run_shiny_app
  - save_local_shiny
- title: AI skills
  desc: Read bundled AI agent skill files (onboarding, Dataverse, registry include).
  contents:
  - ai_skills
  - ai_skill
  - ai_skill_path
build:
  readme: yes
articles:
- title: Articles
  contents:
  - why-replicateEverything
  - meet-the-functions
  - replication-example
  - folder-replication-checklist
  - reanalysis-studies
  - stata-replications
  - shiny-app
  - audit
  - maintainer-setup
  - package-replication-checklist

url: https://replicate-anything.github.io/replicateEverything/
template:
  bootstrap: 5
  includes:
    in_header: mermaid.html
home:
  title: replicateEverything
  description: Reproduce empirical research results programmatically
navbar:
  structure:
    left:
    - home
    - reference
    - articles
    right: github
reference:
- title: Package
  desc: Package overview and help search entry point.
  contents:
  - replicateEverything-package
- title: Registry
  desc: Add and validate package-backed studies.
  contents:
  - check_package_replication
  - add_paper
  - is_package_replication
- title: Discovery
  desc: Find papers and inspect replication metadata.
  contents:
  - get_doi_metadata
  - search_papers
  - normalize_doi
  - load_index
  - find_repo
  - list_replications
  - get_code
  - replication_index_diagnostics
- title: Run replications
  desc: Render tables and figures from registry scripts.
  contents:
  - render_replication
  - render_for_display
  - run_replication
  - replicate_paper
  - validate_replication
  - create_replication_template
  - self_run
  - load_local_replication_data
- title: Artifacts
  desc: Precomputed outputs for Display in the Shiny app.
  contents:
  - get_artifact_path
  - load_artifact
  - save_artifact
  - artifact_available
  - validate_artifact
  - validate_paper_artifacts
- title: Display helpers
  desc: Format analysis output for HTML tables and plots.
  contents:
  - format_for_display
  - normalize_html_table
  - replication_object
  - replication_error_message
  - try_render_for_display
build:
  readme: yes
articles:
- title: Articles
  contents:
  - replication-example
  - package-replication-checklist




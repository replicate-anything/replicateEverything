url: https://replicate-anything.github.io/replicateEverything/
template:
  bootstrap: 5
  includes:
    in_header: mermaid.html
home:
  title: replicateEverything
  description: Discover, run, and contribute computational replications — with a bundled Shiny demo and live app at shiny2.wzb.eu/ipi/replicate/
navbar:
  structure:
    left:
    - home
    - reference
    - articles
    right: github
reference:
- title: Package
  desc: Package overview.
  contents:
  - replicateEverything-package
- title: Discovery
  desc: Find papers and inspect replication metadata.
  contents:
  - load_index
  - search_papers
  - list_replications
  - list_replication_groups
- title: Run replications
  desc: Run tables and figures from registry scripts.
  contents:
  - run_replication
  - get_code
  - run_prep_step
  - list_prep_steps
- title: Shiny demo
  desc: Browse studies and run replications interactively.
  contents:
  - run_shiny_app
  - save_local_shiny
- title: Contribute
  desc: Validate folder-backed studies and sync to the registry.
  contents:
  - build_study_artifacts
  - build_package_artifacts
  - check_folder_replication
  - prepare_folder_paper
  - sync_folder_paper
  - check_package_replication
  - ai_skills
  - ai_skill
  - ai_skill_path
- title: Maintainer setup
  desc: Probe and install study dependencies (R, Python, Stata); configure executables.
  contents:
  - check_study_compatibility
  - install_study_dependencies
  - install_registry_dependencies
  - maintainer_dependency_hint
- title: Registry audit
  desc: Run all registry replications and inspect results.
  contents:
  - audit_everything
build:
  readme: yes
articles:
- title: Articles
  contents:
  - maintainer-setup
  - meet-the-functions
  - replication-example
  - shiny-app
  - audit
  - stata-replications
  - folder-replication-checklist
  - package-replication-checklist

url: https://replicate-anything.github.io/replicateEverything/
template:
  bootstrap: 5
  includes:
    in_header: mermaid.html
home:
  title: replicateEverything
  description: Discover, run, and contribute computational replications — with a bundled Shiny demo and live app at shiny2.wzb.eu/ipi/replicate/
navbar:
  structure:
    left:
    - home
    - reference
    - articles
    right: github
reference:
- title: Package
  desc: Package overview.
  contents:
  - replicateEverything-package
- title: Discovery
  desc: Find papers and inspect replication metadata.
  contents:
  - load_index
  - search_papers
  - list_replications
  - list_replication_groups
  - print.replication_list
  - paper_article_url
- title: Run replications
  desc: Run tables and figures from registry scripts.
  contents:
  - run_replication
  - describe_study_dag
  - study_dag_display
  - study_dag_facets
  - study_output_dir
  - migrate_legacy_steps_yaml
  - get_code
  - run_prep_step
  - list_prep_steps
- title: Shiny demo
  desc: Browse studies and run replications interactively.
  contents:
  - run_shiny_app
  - save_local_shiny
- title: Contribute
  desc: Validate studies and prepare registry handoff files in the study repo.
  contents:
  - build_study_artifacts
  - build_package_artifacts
  - check_folder_replication
  - check_package_replication
  - prepare_study_for_registry
  - prepare_folder_paper
  - ai_skills
  - ai_skill
  - ai_skill_path
- title: Maintainer setup
  desc: Probe and install study dependencies; sync studies into the registry.
  contents:
  - configure_local_monorepo
  - package_build_info
  - check_study_compatibility
  - install_study_dependencies
  - install_registry_dependencies
  - maintainer_dependency_hint
  - replication_kind
  - sync_study_to_registry
  - sync_folder_paper
  - build_registry_index
  - refresh_registry
- title: Registry audit
  desc: Run all registry replications and inspect results.
  contents:
  - audit_everything
  - check_glm_table_benchmark
build:
  readme: yes
articles:
- title: Articles
  contents:
  - why-replicateEverything
  - meet-the-functions
  - replication-example
  - folder-replication-checklist
  - reanalysis-studies
  - stata-replications
  - shiny-app
  - audit
  - maintainer-setup
  - package-replication-checklist

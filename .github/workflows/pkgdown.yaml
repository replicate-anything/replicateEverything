# Optional manual check only — the live site is built locally and committed under docs/.
# GitHub Pages serves docs/ from main (repo Settings → Pages → /docs).
# Run: Rscript scripts/build_pkgdown.R  then commit and push docs/
on:
  workflow_dispatch:

name: pkgdown.yaml

permissions: read-all

jobs:
  pkgdown:
    runs-on: ubuntu-latest
    env:
      REPLICATE_AUDIT_LIVE: "false"
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::pkgdown, local::.
          needs: website

      - uses: quarto-dev/quarto-actions/setup@v2

      - name: Build site (verify only; does not commit or deploy)
        run: pkgdown::build_site_github_pages(new_process = FALSE, install = FALSE)
        shell: Rscript {0}
